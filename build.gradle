 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id "com.github.ben-manes.versions" version "0.51.0"
    id 'org.javamodularity.moduleplugin' version '1.8.15' apply false
}

repositories {
    // Use the plugin portal to apply community plugins in convention plugins.
    gradlePluginPortal()
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'org.javamodularity.moduleplugin'
    apply plugin: 'maven-publish'

    sourceCompatibility = 17
    targetCompatibility = 17

    repositories {
        mavenLocal()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }

    dependencies {
        compileOnly 'org.projectlombok:lombok:1.18.32'
        annotationProcessor 'org.projectlombok:lombok:1.18.32'

        testImplementation 'org.projectlombok:lombok:1.18.32'
        testImplementation 'junit:junit:[4,5)'
        testImplementation 'org.mockito:mockito-core:5.14.2'
    }

    publishing {

        description 'Upload jars to local artifactory'
        //group 'publishing'

        publications {
            mavenJava(MavenPublication) {
                from components.java
                artifactId = project.name  // Use the project name for the artifactId
            }
        }
        repositories {
            mavenLocal()
        }

        /*repositories {
            maven {
               name = "GitHubPackages"
                url = uri("https://maven.pkg.github.com/gerco/messagemanager")
                credentials {
                    username = project.findProperty("gpr.user") ?: System.getenv("USERNAME")
                    password = project.findProperty("gpr.key") ?: System.getenv("TOKEN")
                }

            }
        }
        publications {
            gpr(MavenPublication) {
                from(components.java)
            }
        }*/
    }

    def appVersion = project.version // from gradle.properties
    def buildTimeStamp = new Date().toString()

    compileJava {
        doFirst {
            if (project.file("src/main/java-templates/Version.java").exists()) {

                ant.mkdir(dir: "${projectDir}/src/main/java/${project.targetPackage}")
                def newBuildInfo = new File("${projectDir}/src/main/java/${targetPackage}/Version.java")
                def templateBuildInfo = new File("${projectDir}/src/main/java-templates/Version.java")

                newBuildInfo.withWriter { def writer ->
                    templateBuildInfo.eachLine { def line ->
                        def newLine = line.replace("__PACKAGE", targetPackageJava)
                                .replace("__VERSION", appVersion)
                                .replace("__BUILD_ID", appVersion)
                                .replace("__BUILD_TIMESTAMP", buildTimeStamp)
                        writer.write(newLine + "\n");
                    }
                }
            }
        }
    }

   /* task copyJarToUserData(type: Copy) {
        onlyIf {
            // only copy jar for plugins to the user data folder
            file("${projectDir}/src/main/resources/MessageManager/plugins").exists()
        }

        from "build/libs/${project.name}-${project.version}.jar" // Source path (replace with your JAR name)
        into getUserDataFolder().toString() + "/MessageManager/plugins/${project.version}"
    }*/

    // Copies this subproject's plugin JAR into the bootstrap plugins/ directory.
    //
    // IMPORTANT: implemented as a plain Task with a doLast { copy {} } block — NOT as
    // a `Copy`-typed task — because `Copy` auto-declares its `into` directory as the
    // task's output. Gradle then runs a "stale output cleanup" pass on every build that
    // wipes any file in that directory which wasn't produced by a tracked task. The
    // commercial build (scripts/build-jars.sh in the commercial repo) shell-cp's its
    // plugin JARs into the same plugins/ directory; those would be deleted by the
    // cleanup pass before createUpdate4JConfig reads the directory, producing an
    // Update4J config with only this (OSS) plugin and breaking installed clients on
    // auto-update with "Module messagemanager.common not found" etc.
    //
    // Using a plain Task avoids the directory-output declaration. The script-copied
    // commercial JARs now survive any subsequent OSS Gradle invocation.
    tasks.register('copyJarToBootstrap') {
        dependsOn jar
        onlyIf {
            file("${projectDir}/src/main/resources/MessageManager/plugins").exists()
        }
        doLast {
            def pluginsDir = "${projectDir}/../messagemanager-bootstrap/build/root/target/config/plugins"
            def clientsDir = "${projectDir}/../messagemanager-bootstrap/build/root/target/config/clients"
            ant.mkdir(dir: pluginsDir)
            ant.mkdir(dir: clientsDir) // client jars will be copied to this folder

            copy {
                from "build/libs/${project.name}-${project.version}.jar"
                rename '([a-z]*-[a-z]*).*.jar', '$1.jar' // remove version from jar
                into pluginsDir
            }
        }
    }

    // Ensure copying happens after JAR is built
   // build.dependsOn copyJarToUserData
    jar.finalizedBy('copyJarToBootstrap')
}

protected File getUserDataFolder() {
    def configPath = System.getenv("XDG_CONFIG_DIR")
    if (!configPath) {
        configPath = System.getenv("APPDATA")
    }

    if (!configPath) {
        def userHome = new File(System.getProperty("user.home"))
        return new File(userHome, ".config")
    } else {
        return new File(configPath)
    }
}
